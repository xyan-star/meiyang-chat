<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美羊AI学习力系统 - 智能顾问</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --bg: #f5f7fa;
  --card: #fff;
  --primary: #4f6ef7;
  --primary-hover: #3b5de7;
  --text: #2c3e50;
  --text-secondary: #7f8c9b;
  --border: #e8ecf1;
  --msg-user-bg: #eef1ff;
  --msg-ai-bg: #fff;
  --danger: #e74c3c;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  height: 100vh; display: flex; flex-direction: column;
}

.header {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 20px; display: flex; align-items: center; justify-content: space-between;
  box-shadow: var(--shadow); z-index: 10; flex-shrink: 0;
}
.header h1 { font-size: 17px; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 8px; }
.header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
  background: var(--card); color: var(--text); cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all .15s; white-space: nowrap;
}
.btn:hover { background: #f8f9fb; }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: var(--primary-hover); }
.btn-active { background: #e8ecff; border-color: var(--primary); color: var(--primary); }

.main { flex: 1; display: flex; overflow: hidden; }

.chat-area { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }

.msg { display: flex; gap: 10px; max-width: 82%; animation: fadeIn .25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .avatar {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.msg.ai .avatar { background: #e8ecff; }
.msg.user .avatar { background: #d4e0ff; }
.msg .bubble {
  padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 14px;
  white-space: pre-wrap; word-break: break-word;
}
.msg.ai .bubble { background: var(--msg-ai-bg); border: 1px solid var(--border); border-top-left-radius: 4px; }
.msg.user .bubble { background: var(--primary); color: #fff; border-top-right-radius: 4px; white-space: pre-wrap; }

/* Markdown 渲染样式 */
.bubble h1,.bubble h2,.bubble h3,.bubble h4 { margin: 8px 0 4px; line-height: 1.3; }
.bubble h1 { font-size: 1.2em; } .bubble h2 { font-size: 1.1em; } .bubble h3 { font-size: 1.05em; }
.bubble p { margin: 4px 0; }
.bubble ul,.bubble ol { padding-left: 20px; margin: 4px 0; }
.bubble li { margin: 2px 0; }
.bubble code { background: #f0f0f5; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: "SF Mono", "Fira Code", "Consolas", monospace; }
.bubble pre { background: #f5f6fa; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; overflow-x: auto; margin: 6px 0; }
.bubble pre code { background: none; padding: 0; font-size: 0.85em; }
.bubble blockquote { border-left: 3px solid var(--primary); padding-left: 12px; margin: 6px 0; color: var(--text-secondary); }
.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }
.bubble a { color: var(--primary); text-decoration: underline; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
.bubble table { border-collapse: collapse; margin: 6px 0; width: 100%; }
.bubble th,.bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; font-size: 0.95em; }
.bubble th { background: #f8f9fb; font-weight: 600; }
.bubble > *:first-child { margin-top: 0; }
.bubble > *:last-child { margin-bottom: 0; }

.typing .bubble { display: flex; gap: 4px; padding: 14px 18px; }
.typing .bubble span {
  width: 7px; height: 7px; border-radius: 50%; background: #b0b8c8;
  animation: bounce 1.2s infinite;
}
.typing .bubble span:nth-child(2) { animation-delay: .2s; }
.typing .bubble span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

.rag-badge {
  display: inline-block; font-size: 10px; background: #e8ecff;
  color: var(--primary); padding: 2px 8px; border-radius: 10px;
  margin-left: 8px; vertical-align: middle;
}

.chat-input-area {
  padding: 12px 20px; border-top: 1px solid var(--border);
  background: var(--card); display: flex; gap: 8px; flex-shrink: 0;
}
.chat-input-area input {
  flex: 1; padding: 10px 16px; border: 1px solid var(--border);
  border-radius: 24px; font-size: 14px; outline: none; transition: border .15s; background: var(--bg);
}
.chat-input-area input:focus { border-color: var(--primary); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: var(--primary); color: #fff; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: all .15s; flex-shrink: 0;
}
.send-btn:hover { background: var(--primary-hover); }
.send-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ===== 设置面板 ===== */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.4); z-index: 100; display: none;
  align-items: center; justify-content: center;
}
.overlay.show { display: flex; }
.panel {
  background: var(--card); border-radius: 16px; padding: 24px;
  width: 90%; max-width: 500px; box-shadow: 0 8px 30px rgba(0,0,0,.15);
  max-height: 85vh; overflow-y: auto;
}
.panel h2 { font-size: 17px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.panel .form-group { margin-bottom: 14px; }
.panel label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: var(--text-secondary); }
.panel input, .panel select, .panel textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 14px; outline: none; transition: border .15s;
  font-family: inherit;
}
.panel input:focus, .panel select:focus, .panel textarea:focus { border-color: var(--primary); }
.panel textarea { resize: vertical; min-height: 80px; }
.panel .hint { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
.panel .form-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* ===== 状态栏 ===== */
.status-bar {
  padding: 4px 20px; font-size: 11px; color: var(--text-secondary);
  display: flex; align-items: center; gap: 8px; background: #fafbfc;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.status-bar .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot.ok { background: #27ae60; } .dot.warn { background: #f39c12; } .dot.err { background: var(--danger); }

.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; color: var(--text-secondary); gap: 12px; padding: 40px;
}
.empty-state .big-icon { font-size: 48px; }
.empty-state p { font-size: 14px; text-align: center; line-height: 1.6; }

.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  padding: 10px 20px; border-radius: 8px; font-size: 13px; color: #fff;
  z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none;
}
.toast.show { opacity: 1; }
.toast.success { background: #27ae60; } .toast.error { background: var(--danger); }

/* ===== 解锁门 ===== */
.lock-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.5); z-index: 300;
  display: flex; align-items: center; justify-content: center;
}
.lock-overlay.hidden { display: none; }
.lock-panel {
  background: var(--card); border-radius: 16px; padding: 32px 28px;
  width: 90%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.2);
  text-align: center;
}
.lock-panel .lock-icon { font-size: 42px; margin-bottom: 12px; }
.lock-panel h2 { font-size: 18px; margin-bottom: 6px; color: var(--text); }
.lock-panel .lock-hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; }
.lock-panel input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 15px; outline: none; text-align: center;
  letter-spacing: 2px; transition: border .15s;
}
.lock-panel input:focus { border-color: var(--primary); }
.lock-panel .lock-btn {
  width: 100%; margin-top: 14px; padding: 10px; border: none;
  border-radius: 10px; background: var(--primary); color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer; transition: background .15s;
}
.lock-panel .lock-btn:hover { background: var(--primary-hover); }
.lock-panel .lock-err { font-size: 12px; color: var(--danger); margin-top: 8px; min-height: 18px; }
</style>
</head>
<body>

<!-- 解锁门 -->
<div class="lock-overlay" id="lockOverlay">
  <div class="lock-panel">
    <div class="lock-icon">🔒</div>
    <h2>知识库已加密</h2>
    <p class="lock-hint">请输入访问密码解锁知识库</p>
    <input type="password" id="lockPassword" placeholder="输入密码..." onkeydown="if(event.key==='Enter')unlockKB()">
    <button class="lock-btn" onclick="unlockKB()">🔓 解锁</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<div class="header">
  <h1><span>🐑</span>美羊AI学习力智能顾问</h1>
  <div class="header-actions">
    <button class="btn" onclick="clearChat()">🗑 清空</button>
    <button class="btn btn-primary" onclick="openSettings()">⚙ API</button>
  </div>
</div>

<div class="main">
  <!-- 聊天区 -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <span class="big-icon">📚</span>
        <p>美羊AI学习力系统赋能专家已就绪<br>基于北师大杨娟教授团队BMA学习力模型<br>请输入你的问题，开始对话吧</p>
      </div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="userInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<div class="status-bar">
  <span>状态：</span><span class="dot" id="statusDot"></span>
  <span id="statusText">未配置API</span>
</div>

<!-- API设置面板 -->
<div class="overlay" id="settingsOverlay">
  <div class="panel">
    <h2>⚙ API 配置</h2>
    <div class="form-group">
      <label>API 地址</label>
      <input type="url" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
      <div class="hint">支持 OpenAI 兼容接口（MiMo / DeepSeek / 通义千问等）</div>
    </div>
    <div class="form-group">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入密钥...">
    </div>
    <div class="form-group">
      <label>模型名称</label>
      <input type="text" id="modelName" placeholder="gpt-4o / mimo-v2-pro / deepseek-chat">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary" onclick="saveSettings()">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ==================== 知识库（AES加密） ====================
let knowledgeBase = [];
let kbEncryptedData = null; // { enc: "...", algo: "aes-256-cbc" }
const ragEnabled = true;

// Fetch encrypted knowledge base
async function fetchEncryptedKB() {
  try {
    const resp = await fetch('knowledge_base.json');
    if (resp.ok) {
      kbEncryptedData = await resp.json();
    }
  } catch { /* will show unlock */ }
}

// AES-256-CBC decrypt via Web Crypto API
async function decryptKB(password) {
  if (!kbEncryptedData || !kbEncryptedData.enc) throw new Error('未找到知识库数据');

  const raw = Uint8Array.from(atob(kbEncryptedData.enc), c => c.charCodeAt(0));
  const iv = raw.slice(0, 16);
  const ciphertext = raw.slice(16);

  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: enc.encode('meiyang-salt'), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-CBC', length: 256 },
    false,
    ['decrypt']
  );

  const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, ciphertext);
  const json = new TextDecoder().decode(decrypted);
  knowledgeBase = JSON.parse(json);
  
  // Cache in sessionStorage for this session
  sessionStorage.setItem('meiyang_kb_unlocked', '1');
  sessionStorage.setItem('meiyang_kb_data', json);
}

function unlockKB() {
  const input = document.getElementById('lockPassword');
  const errEl = document.getElementById('lockErr');
  const password = input.value.trim();
  
  if (!password) {
    errEl.textContent = '请输入密码';
    return;
  }

  errEl.textContent = '';
  decryptKB(password).then(() => {
    document.getElementById('lockOverlay').classList.add('hidden');
    document.getElementById('userInput').focus();
  }).catch(() => {
    errEl.textContent = '密码错误，请重试';
    input.value = '';
    input.focus();
  });
}

async function initKB() {
  // Check if already unlocked this session
  const cached = sessionStorage.getItem('meiyang_kb_data');
  if (cached) {
    try {
      knowledgeBase = JSON.parse(cached);
      document.getElementById('lockOverlay').classList.add('hidden');
      return;
    } catch { sessionStorage.removeItem('meiyang_kb_data'); }
  }

  await fetchEncryptedKB();
  
  if (kbEncryptedData && kbEncryptedData.enc) {
    // Show unlock screen
    document.getElementById('lockOverlay').classList.remove('hidden');
    document.getElementById('lockPassword').focus();
  }
}

// ==================== RAG 检索 ====================
// 分词（简单的中文分词）
function tokenize(text) {
  const cleaned = text.toLowerCase().replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, ' ');
  // 提取所有2-4字的中文词组和英文单词
  const tokens = [];
  const words = cleaned.split(/\s+/).filter(w => w);
  for (const w of words) {
    if (/^[a-zA-Z]+$/.test(w)) {
      tokens.push(w);
    } else {
      // 中文逐字合并
      for (let i = 0; i < w.length; i++) {
        tokens.push(w[i]);
        if (i + 1 < w.length) tokens.push(w[i] + w[i+1]);
      }
    }
  }
  return [...new Set(tokens)];
}

function searchKB(query) {
  if (!ragEnabled || !query.trim()) return [];
  const queryTokens = tokenize(query);

  const scored = knowledgeBase.map(item => {
    const itemText = (item.title + ' ' + (item.category || item.cat) + ' ' + item.content).toLowerCase();
    let score = 0;
    for (const token of queryTokens) {
      if (token.length < 2) continue; // skip single chars
      const count = (itemText.match(new RegExp(token.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g')) || []).length;
      score += count * token.length; // longer match = higher weight
    }
    // Bonus for title/category match
    for (const token of queryTokens) {
      if (token.length >= 2 && (item.title + ' ' + (item.category || item.cat)).toLowerCase().includes(token)) {
        score += 3;
      }
    }
    return { item, score };
  });

  scored.sort((a, b) => b.score - a.score);

  // Return top 3 with score > 0
  const threshold = scored.length > 0 ? Math.max(1, scored[0].score * 0.3) : 1;
  return scored.filter(s => s.score >= threshold).slice(0, 3).map(s => s.item);
}

function buildRAGContext(query) {
  const matches = searchKB(query);
  if (matches.length === 0) return '';
  return '\n\n【以下为知识库检索到的相关信息，请参考用于回答】\n' +
    matches.map((m, i) => `[${i+1}] ${m.title}: ${m.content}`).join('\n') +
    '\n【信息结束】';
}

// ==================== 系统提示词（精简核心） ====================
const CORE_SYSTEM_PROMPT = `你是美羊AI学习力系统赋能专家，基于北师大杨娟教授团队BMA学习力模型(动力/策略/习惯)解答。

核心规则：
- 内容简短，去除AI感，不写系统操作只讲怎么做
- 个案优先推1对1课程，特殊才推团辅课
- 不透露测评分数数值给客户
- 系统只有三门课：1对1课程、团辅课程、学科素养课，其他需客户自行教研
- 特殊情况要追问，不盲目回答
- 测评是综合评估不是简单自我打分

平台角色：美羊是赋能者，不直接开课，所有课程由合作伙伴(学习力指导师)完成教学交付。

基础产品：
- 14项免费测评(学习力综合/学科能力/选科/志愿/MBTI/心理健康/教养风格)
- 1对1课程：测评后自动推送三阶段36个主题
- 团辅课：30+节课件，暖身→转换→工作→结束四阶段，一阶(自我探索与习惯)/二阶(外部探索)/三阶(生涯与策略)
- 学科素养课：小4-6语文数学，培养底层学习能力
- 商业闭环：免费测评引流→收费解读建信任→转化课程→续费

解读报告：对学生用四原则+五步法，对家长用汉堡包法。转化时机在家长问"怎么帮"。`;

let conversationHistory = [];

// ==================== API调用 ====================
async function* callAPIStream(messages) {
  const settings = getSettings();
  if (!settings.apiBaseUrl || !settings.apiKey) throw new Error('请先配置API地址和Key');

  const url = settings.apiBaseUrl.replace(/\/+$/, '') + '/chat/completions';
  const response = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${settings.apiKey}` },
    body: JSON.stringify({
      model: settings.modelName || 'gpt-4o',
      messages: messages,
      temperature: 0.7,
      max_completion_tokens: 2048,
      stream: true,
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    let errMsg;
    try { errMsg = JSON.parse(errText).error?.message || errText; } catch { errMsg = errText; }
    throw new Error(`API调用失败: ${errMsg}`);
  }

  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') return;
      try {
        const parsed = JSON.parse(data);
        const content = parsed.choices?.[0]?.delta?.content;
        if (content) yield content;
      } catch { /* skip */ }
    }
  }
}

// ==================== 消息处理 ====================
function sendMessage() {
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  const settings = getSettings();
  if (!settings.apiBaseUrl || !settings.apiKey) {
    showToast('请先配置API', 'error');
    openSettings();
    return;
  }

  input.value = ''; input.disabled = true; sendBtn.disabled = true;
  hideEmptyState();

  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const aiMsgEl = addMessage('ai', '', true);
  const bubble = aiMsgEl.querySelector('.bubble');

  // Build RAG context
  const ragContext = buildRAGContext(text);
  let systemPrompt = CORE_SYSTEM_PROMPT;
  if (ragContext) {
    systemPrompt += ragContext;
  }

  const messages = [
    { role: 'system', content: systemPrompt },
    ...conversationHistory,
  ];

  // Show RAG indicator if used
  if (ragContext) {
    const matches = searchKB(text);
    const badge = document.createElement('span');
    badge.className = 'rag-badge';
    badge.textContent = '📚 检索到 ' + matches.length + ' 条知识';
    aiMsgEl.querySelector('.avatar').after(badge);
  }

  let fullContent = '';
  (async () => {
    try {
      for await (const chunk of callAPIStream(messages)) {
        fullContent += chunk;
        bubble.innerHTML = renderMarkdown(fullContent);
        aiMsgEl.classList.remove('typing');
        scrollToBottom();
      }
      conversationHistory.push({ role: 'assistant', content: fullContent });
      updateStatus(true);
    } catch (err) {
      bubble.textContent = '❌ ' + err.message;
      aiMsgEl.classList.remove('typing');
      conversationHistory.pop();
      updateStatus(false);
    } finally {
      input.disabled = false; sendBtn.disabled = false;
      input.focus(); scrollToBottom();
    }
  })();
}

function addMessage(role, content, isTyping = false) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}${isTyping ? ' typing' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🐑';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (isTyping) {
    bubble.innerHTML = '<span></span><span></span><span></span>';
  } else {
    if (role === 'user') {
      bubble.textContent = content;
    } else {
      bubble.innerHTML = renderMarkdown(content);
    }
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  scrollToBottom();
  return div;
}

function hideEmptyState() {
  const es = document.getElementById('emptyState');
  if (es) es.style.display = 'none';
}

function clearChat() {
  conversationHistory = [];
  document.getElementById('chatMessages').innerHTML = `
    <div class="empty-state" id="emptyState">
      <span class="big-icon">📚</span>
      <p>美羊AI学习力系统赋能专家已就绪<br>基于北师大杨娟教授团队BMA学习力模型<br>请输入你的问题，开始对话吧</p>
    </div>`;
}

function scrollToBottom() {
  const c = document.getElementById('chatMessages');
  requestAnimationFrame(() => { c.scrollTop = c.scrollHeight; });
}

// ==================== Markdown 渲染 ====================
marked.setOptions({ breaks: true, gfm: true });

function renderMarkdown(text) {
  if (!text) return '';
  try {
    return marked.parse(text);
  } catch {
    // Fallback: escape HTML and wrap in pre
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML.replace(/\n/g, '<br>');
  }
}

// ==================== 知识库管理（仅内部） ====================
function updateKBCount() {
  document.getElementById('kbStatus') && (document.getElementById('kbStatus').textContent = knowledgeBase.length + '条');
}

// ==================== 设置 ====================
function getSettings() {
  try { return JSON.parse(localStorage.getItem('meiyang_settings') || '{}'); } catch { return {}; }
}
function openSettings() {
  const s = getSettings();
  document.getElementById('apiBaseUrl').value = s.apiBaseUrl || '';
  document.getElementById('apiKey').value = s.apiKey || '';
  document.getElementById('modelName').value = s.modelName || '';
  document.getElementById('settingsOverlay').classList.add('show');
}
function closeSettings() { document.getElementById('settingsOverlay').classList.remove('show'); }
function saveSettings() {
  const s = {
    apiBaseUrl: document.getElementById('apiBaseUrl').value.trim(),
    apiKey: document.getElementById('apiKey').value.trim(),
    modelName: document.getElementById('modelName').value.trim(),
  };
  if (!s.apiBaseUrl || !s.apiKey) { showToast('API地址和Key不能为空', 'error'); return; }
  localStorage.setItem('meiyang_settings', JSON.stringify(s));
  closeSettings();
  updateStatus(null);
  showToast('配置已保存 ✓', 'success');
}

function updateStatus(ok) {
  const dot = document.getElementById('statusDot'), text = document.getElementById('statusText');
  const s = getSettings();
  dot.className = 'dot';
  if (ok === true) { dot.classList.add('ok'); text.textContent = `已连接 | ${s.modelName||'模型'}`; }
  else if (ok === false) { dot.classList.add('err'); text.textContent = '连接失败'; }
  else if (s.apiBaseUrl && s.apiKey) { dot.classList.add('ok'); text.textContent = `已配置 | ${s.modelName||''} | ${s.apiBaseUrl}`; }
  else { dot.classList.add('warn'); text.textContent = '未配置API'; }
}

// ==================== Toast ====================
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', async () => {
  await initKB();
  updateStatus(null);
  document.getElementById('userInput').focus();

  // 关闭面板点击外部
  document.querySelectorAll('.overlay').forEach(ov => {
    ov.addEventListener('click', function(e) { if (e.target === this) { this.classList.remove('show'); } });
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.overlay.show').forEach(o => o.classList.remove('show'));
  }
  if (e.ctrlKey && e.key === 'Enter') sendMessage();
});
</script>
